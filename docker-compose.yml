services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: iplus
      POSTGRES_USER: iplus
      POSTGRES_PASSWORD: iplus
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://iplus:iplus@db:5432/iplus
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /Volumes:/Volumes:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
